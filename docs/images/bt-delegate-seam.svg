<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="12">
  <rect width="980" height="420" fill="#f8fafc" rx="10"/>
  <text x="24" y="28" font-size="14" font-weight="bold" fill="#0f172a">The :delegate isolated-blackboard seam</text>
  <text x="24" y="46" font-size="11" fill="#64748b">Values are COPIED in via :reads. Results are COPIED back via :writes. Child cannot see parent state. Parent cannot see child internals.</text>

  <!-- Parent blackboard -->
  <rect x="16" y="60" width="300" height="340" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="16" y="60" width="300" height="32" rx="10" fill="#1e293b"/>
  <rect x="16" y="82" width="300" height="10" fill="#1e293b"/>
  <text x="32" y="80" font-size="11" font-weight="bold" fill="white">Parent blackboard</text>
  <!-- bb keys -->
  <text x="32" y="114" font-size="11" fill="#374151">:contract-v2</text>       <rect x="170" y="100" width="130" height="20" rx="3" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/><text x="178" y="114" font-size="10" fill="#0369a1">"Agreement text..."</text>
  <text x="32" y="138" font-size="11" fill="#374151">:contract-v3</text>       <rect x="170" y="124" width="130" height="20" rx="3" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/><text x="178" y="138" font-size="10" fill="#0369a1">"Revised text..."</text>
  <text x="32" y="162" font-size="11" fill="#374151">:document-survey</text>   <rect x="170" y="148" width="130" height="20" rx="3" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/><text x="178" y="162" font-size="10" fill="#166534">"Both versions..."</text>
  <text x="170" y="144" font-size="9" fill="#059669" font-weight="600">    ← passed in</text>
  <line x1="32" y1="172" x2="298" y2="172" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="32" y="192" font-size="10" fill="#94a3b8" font-style="italic">...after delegate returns...</text>
  <text x="32" y="214" font-size="11" fill="#374151">:risk-summary</text>      <rect x="170" y="200" width="130" height="20" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/><text x="178" y="214" font-size="10" fill="#166534">"3 HIGH risks..."</text>
  <text x="170" y="196" font-size="9" fill="#059669" font-weight="600">    ← written back</text>

  <text x="32" y="250" font-size="10" fill="#94a3b8">The parent NEVER sees:</text>
  <text x="32" y="266" font-size="10" fill="#ef4444">  :risk-list  (internal child key)</text>
  <text x="32" y="282" font-size="10" fill="#ef4444">  :reasoning  (child's intermediate)</text>
  <text x="32" y="298" font-size="10" fill="#94a3b8">These keys exist only in the</text>
  <text x="32" y="314" font-size="10" fill="#94a3b8">child's isolated blackboard.</text>

  <!-- delegate node -->
  <rect x="340" y="140" width="240" height="130" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
  <rect x="340" y="140" width="240" height="26" rx="8" fill="#059669"/>
  <rect x="340" y="158" width="240" height="8" fill="#059669"/>
  <text x="356" y="158" font-size="11" font-weight="bold" fill="white">[:delegate] risk-check</text>
  <text x="356" y="184" font-size="10" fill="#064e3b">:reads  [:document-survey]</text>
  <text x="356" y="200" font-size="10" fill="#064e3b">:writes [:risk-summary]</text>
  <text x="356" y="216" font-size="10" fill="#059669">:timeout-ms 60000</text>
  <text x="356" y="234" font-size="10" fill="#039855" font-style="italic">spawns a child tick</text>
  <text x="356" y="250" font-size="10" fill="#039855" font-style="italic">with an isolated copy</text>
  <!-- copies-in arrow -->
  <line x1="316" y1="162" x2="340" y2="162" stroke="#059669" stroke-width="2"/>
  <polygon points="337,157 347,162 337,167" fill="#059669"/>
  <text x="280" y="156" font-size="9" fill="#059669" font-weight="600">copies in</text>
  <!-- writes-back arrow -->
  <line x1="340" y1="210" x2="316" y2="210" stroke="#059669" stroke-width="2"/>
  <polygon points="319,205 309,210 319,215" fill="#059669"/>
  <text x="270" y="204" font-size="9" fill="#059669" font-weight="600">copies back</text>

  <!-- child blackboard -->
  <rect x="620" y="60" width="344" height="340" rx="10" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="620" y="60" width="344" height="32" rx="10" fill="#047857"/>
  <rect x="620" y="82" width="344" height="10" fill="#047857"/>
  <text x="636" y="80" font-size="11" font-weight="bold" fill="white">Child isolated blackboard</text>
  <!-- child bb keys -->
  <text x="636" y="114" font-size="11" fill="#374151">:document-survey</text>   <rect x="790" y="100" width="158" height="20" rx="3" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/><text x="798" y="114" font-size="10" fill="#166534">"Both versions..."</text>
  <text x="636" y="132" font-size="9" fill="#059669">  (copy from parent)</text>
  <line x1="636" y1="142" x2="958" y2="142" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="636" y="162" font-size="10" fill="#94a3b8" font-style="italic">...produced during child execution...</text>
  <text x="636" y="184" font-size="11" fill="#374151">:risk-list</text>         <rect x="790" y="170" width="158" height="20" rx="3" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/><text x="798" y="184" font-size="10" fill="#78350f">["GDPR §7.3"...]</text>
  <text x="636" y="208" font-size="11" fill="#374151">:reasoning</text>         <rect x="790" y="194" width="158" height="20" rx="3" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/><text x="798" y="208" font-size="10" fill="#78350f">"Section 5 states..."</text>
  <text x="636" y="232" font-size="11" fill="#374151">:risk-summary</text>      <rect x="790" y="218" width="158" height="20" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/><text x="798" y="232" font-size="10" fill="#166534">"3 HIGH risks..."</text>
  <text x="790" y="214" font-size="9" fill="#059669" font-weight="600">    ← declared in :writes</text>

  <!-- what stays in child -->
  <rect x="636" y="254" width="310" height="60" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="652" y="272" font-size="10" fill="#be123c" font-weight="600">:risk-list and :reasoning stay here.</text>
  <text x="652" y="286" font-size="10" fill="#be123c">Only :risk-summary (declared in</text>
  <text x="652" y="300" font-size="10" fill="#be123c">:writes) is copied back to parent.</text>

  <!-- child tree mini preview -->
  <rect x="636" y="326" width="310" height="60" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="652" y="342" font-size="10" fill="#065f46" font-weight="600">Child tree executes fully inside:</text>
  <text x="652" y="356" font-size="10" fill="#059669">[:sequence] → [:llm] identify-risks</text>
  <text x="652" y="370" font-size="10" fill="#059669">           → [:llm] assess-severity</text>

  <!-- seam line -->
  <line x1="580" y1="60" x2="580" y2="400" stroke="#059669" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="568" y="415" font-size="10" fill="#059669" text-anchor="middle" transform="rotate(-90 568 410)">seam</text>

  <!-- Read/write arrows -->
  <path d="M 580 165 C 600 165 600 183 620 183" stroke="#059669" stroke-width="1.5" fill="none"/>
  <path d="M 620 225 C 600 225 600 207 580 207" stroke="#059669" stroke-width="1.5" fill="none"/>
</svg>
