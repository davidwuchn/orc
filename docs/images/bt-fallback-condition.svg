<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="12">
  <rect width="860" height="520" fill="#f8fafc" rx="10"/>
  <text x="24" y="28" font-size="14" font-weight="bold" fill="#0f172a">[:fallback] + [:condition] — if/else branching</text>
  <text x="24" y="46" font-size="11" fill="#64748b">[:fallback] tries children left-to-right. [:condition] fails fast when the check is false — routing to the next branch.</text>

  <!-- root sequence container -->
  <rect x="16" y="60" width="828" height="444" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- fallback container -->
  <rect x="32" y="80" width="796" height="408" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="2" stroke-dasharray="7,4"/>
  <rect x="32" y="80" width="260" height="24" rx="4" fill="#fae8ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="44" y="97" font-size="11" fill="#86198f" font-weight="600">[:fallback] route-by-status   (first success wins)</text>

  <!-- Branch 1 label -->
  <text x="88" y="122" font-size="10" fill="#6b21a8" font-weight="600">① if :status is :qualified</text>
  <!-- Branch 2 label -->
  <text x="380" y="122" font-size="10" fill="#6b21a8" font-weight="600">② if :status is :review</text>
  <!-- Branch 3 label -->
  <text x="666" y="122" font-size="10" fill="#6b21a8" font-weight="600">③ default</text>

  <!-- Fan-out line -->
  <line x1="220" y1="108" x2="220" y2="130" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="80" y1="130" x2="790" y2="130" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="80" y1="130" x2="80" y2="144" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="440" y1="130" x2="440" y2="144" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="726" y1="130" x2="726" y2="144" stroke="#d946ef" stroke-width="1.5"/>

  <!-- Branch 1 sequence: check-qualified → fast-track-llm -->
  <rect x="48" y="144" width="264" height="318" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="48" y="144" width="130" height="20" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="58" y="158" font-size="10" fill="#5b21b6" font-weight="600">[:sequence]</text>
  <!-- condition node -->
  <line x1="180" y1="164" x2="180" y2="178" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="64" y="178" width="232" height="68" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <rect x="64" y="178" width="232" height="22" rx="6" fill="#7c3aed"/>
  <rect x="64" y="192" width="232" height="6" fill="#7c3aed"/>
  <text x="80" y="192" font-size="11" font-weight="bold" fill="white">[:condition] check</text>
  <text x="80" y="214" font-size="10" fill="#4c1d95">:key   :status</text>
  <text x="80" y="228" font-size="10" fill="#4c1d95">:op    :equals</text>
  <text x="80" y="239" font-size="10" fill="#4c1d95">:value :qualified</text>
  <!-- success/fail labels -->
  <rect x="64" y="248" width="84" height="16" rx="3" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="74" y="260" font-size="9" fill="#166534">✓ success → next</text>
  <rect x="156" y="248" width="84" height="16" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="166" y="260" font-size="9" fill="#991b1b">✗ fails → branch ②</text>
  <!-- connector to llm -->
  <line x1="180" y1="264" x2="180" y2="280" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="176,278 180,286 184,278" fill="#7c3aed"/>
  <!-- fast-track llm -->
  <rect x="64" y="288" width="232" height="68" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="64" y="288" width="232" height="22" rx="6" fill="#4a7fe5"/>
  <rect x="64" y="302" width="232" height="6" fill="#4a7fe5"/>
  <text x="80" y="302" font-size="11" font-weight="bold" fill="white">[:llm] fast-track</text>
  <text x="80" y="326" font-size="10" fill="#1e3a5f">reads: <tspan fill="#1d4ed8">status, lead-data</tspan></text>
  <text x="80" y="342" font-size="10" fill="#1e3a5f">writes: <tspan fill="#7c3aed">★ reasoning</tspan><tspan fill="#1d4ed8">, response</tspan></text>
  <!-- success note -->
  <rect x="64" y="368" width="232" height="80" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="78" y="384" font-size="10" fill="#1d4ed8">Condition passes → runs.</text>
  <text x="78" y="398" font-size="10" fill="#1d4ed8">:fallback sees :success</text>
  <text x="78" y="412" font-size="10" fill="#1d4ed8">from this sequence.</text>
  <text x="78" y="426" font-size="10" fill="#6b7280">→ branches ② ③ never run.</text>
  <text x="78" y="440" font-size="10" fill="#6b7280">  (first success stops)</text>

  <!-- Branch 2 sequence: check-review → human-review-llm -->
  <rect x="328" y="144" width="264" height="318" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="328" y="144" width="130" height="20" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="338" y="158" font-size="10" fill="#5b21b6" font-weight="600">[:sequence]</text>
  <line x1="460" y1="164" x2="460" y2="178" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="344" y="178" width="232" height="68" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <rect x="344" y="178" width="232" height="22" rx="6" fill="#7c3aed"/>
  <rect x="344" y="192" width="232" height="6" fill="#7c3aed"/>
  <text x="360" y="192" font-size="11" font-weight="bold" fill="white">[:condition] check</text>
  <text x="360" y="214" font-size="10" fill="#4c1d95">:key   :status</text>
  <text x="360" y="228" font-size="10" fill="#4c1d95">:op    :equals</text>
  <text x="360" y="239" font-size="10" fill="#4c1d95">:value :review</text>
  <rect x="344" y="248" width="84" height="16" rx="3" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="354" y="260" font-size="9" fill="#166534">✓ success → next</text>
  <rect x="436" y="248" width="84" height="16" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="446" y="260" font-size="9" fill="#991b1b">✗ fails → branch ③</text>
  <line x1="460" y1="264" x2="460" y2="280" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="456,278 460,286 464,278" fill="#7c3aed"/>
  <rect x="344" y="288" width="232" height="68" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="344" y="288" width="232" height="22" rx="6" fill="#4a7fe5"/>
  <rect x="344" y="302" width="232" height="6" fill="#4a7fe5"/>
  <text x="360" y="302" font-size="11" font-weight="bold" fill="white">[:llm] human-review</text>
  <text x="360" y="326" font-size="10" fill="#1e3a5f">reads: <tspan fill="#1d4ed8">status, lead-data</tspan></text>
  <text x="360" y="342" font-size="10" fill="#1e3a5f">writes: <tspan fill="#7c3aed">★ reasoning</tspan><tspan fill="#1d4ed8">, response</tspan></text>
  <rect x="344" y="368" width="232" height="80" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="358" y="384" font-size="10" fill="#1d4ed8">Only runs when branch ①</text>
  <text x="358" y="398" font-size="10" fill="#1d4ed8">condition failed (status≠</text>
  <text x="358" y="412" font-size="10" fill="#1d4ed8">:qualified). If this succeeds</text>
  <text x="358" y="426" font-size="10" fill="#6b7280">→ branch ③ never runs.</text>

  <!-- Branch 3: code default -->
  <rect x="608" y="144" width="204" height="318" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="608" y="144" width="130" height="20" rx="4" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="618" y="158" font-size="10" fill="#065f46" font-weight="600">[:code] default-response</text>
  <text x="618" y="190" font-size="10" fill="#374151">reads:</text>
  <text x="660" y="190" font-size="10" fill="#047857">lead-data</text>
  <text x="618" y="208" font-size="10" fill="#374151">writes:</text>
  <text x="660" y="208" font-size="10" fill="#047857">response</text>
  <rect x="618" y="226" width="178" height="220" rx="4" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="630" y="244" font-size="10" fill="#065f46" font-weight="600">Last resort.</text>
  <text x="630" y="260" font-size="10" fill="#065f46">Deterministic code.</text>
  <text x="630" y="276" font-size="10" fill="#065f46">Always succeeds.</text>
  <text x="630" y="296" font-size="10" fill="#374151">Runs only when</text>
  <text x="630" y="310" font-size="10" fill="#374151">branches ① and ②</text>
  <text x="630" y="324" font-size="10" fill="#374151">both failed their</text>
  <text x="630" y="338" font-size="10" fill="#374151">conditions.</text>
  <text x="630" y="358" font-size="10" fill="#059669">:fallback guarantees</text>
  <text x="630" y="372" font-size="10" fill="#059669">a :response is written.</text>

  <!-- Fan-in hint -->
  <line x1="80" y1="472" x2="790" y2="472" stroke="#d946ef" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="434" y="488" font-size="10" fill="#86198f" text-anchor="middle">:fallback returns :success if ANY branch returned :success</text>
  <text x="434" y="502" font-size="10" fill="#86198f" text-anchor="middle">:fallback returns :failure only if ALL branches failed</text>
</svg>
