<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="12">
  <rect width="920" height="480" fill="#f8fafc" rx="10"/>
  <text x="24" y="28" font-size="14" font-weight="bold" fill="#0f172a">[:llm-condition] routing inside [:fallback]</text>
  <text x="24" y="46" font-size="11" fill="#64748b">LLM makes the routing decision (yes/no). [:fallback] tries branches in order — first success wins. Think of it as LLM-driven if/else-if/else.</text>

  <rect x="16" y="60" width="888" height="406" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- fallback container -->
  <rect x="32" y="78" width="856" height="358" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="2" stroke-dasharray="7,4"/>
  <rect x="32" y="78" width="290" height="24" rx="4" fill="#fae8ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="44" y="95" font-size="11" fill="#86198f" font-weight="600">[:fallback] route-by-intent   (first success wins)</text>

  <!-- fanout -->
  <line x1="440" y1="102" x2="440" y2="118" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="84" y1="118" x2="852" y2="118" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="84" y1="118" x2="84" y2="132" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="440" y1="118" x2="440" y2="132" stroke="#d946ef" stroke-width="1.5"/>
  <line x1="800" y1="118" x2="800" y2="132" stroke="#d946ef" stroke-width="1.5"/>

  <!-- Branch 1: complaint path -->
  <rect x="48" y="132" width="276" height="290" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="48" y="132" width="100" height="20" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="58" y="146" font-size="10" fill="#5b21b6" font-weight="600">[:sequence]</text>
  <line x1="186" y1="152" x2="186" y2="166" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- llm-condition 1 -->
  <rect x="64" y="166" width="244" height="76" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <rect x="64" y="166" width="244" height="22" rx="6" fill="#9333ea"/>
  <rect x="64" y="180" width="244" height="6" fill="#9333ea"/>
  <text x="80" y="180" font-size="11" font-weight="bold" fill="white">[:llm-condition] is-complaint?</text>
  <text x="80" y="204" font-size="10" fill="#581c87">:model  gemini-2.5-flash</text>
  <text x="80" y="218" font-size="10" fill="#581c87">:question "Is this a complaint?"</text>
  <text x="80" y="232" font-size="10" fill="#581c87">:reads  [:message]</text>
  <!-- yes/no badges -->
  <rect x="64" y="244" width="52" height="16" rx="3" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="76" y="256" font-size="9" fill="#166534">yes → next</text>
  <rect x="124" y="244" width="60" height="16" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="134" y="256" font-size="9" fill="#991b1b">no → branch ②</text>
  <!-- llm response -->
  <line x1="186" y1="260" x2="186" y2="276" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="182,274 186,282 190,274" fill="#7c3aed"/>
  <rect x="64" y="284" width="244" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="64" y="284" width="244" height="22" rx="6" fill="#4a7fe5"/>
  <rect x="64" y="298" width="244" height="6" fill="#4a7fe5"/>
  <text x="80" y="298" font-size="11" font-weight="bold" fill="white">[:llm] complaint-response</text>
  <text x="80" y="322" font-size="10" fill="#1e3a5f">reads:  <tspan fill="#1d4ed8">message</tspan></text>
  <text x="80" y="336" font-size="10" fill="#1e3a5f">writes: <tspan fill="#7c3aed">★ reasoning</tspan><tspan fill="#1d4ed8">, reply</tspan></text>
  <text x="64" y="360" font-size="9" fill="#6b7280" font-style="italic">  LLM decided: complaint path</text>
  <text x="64" y="374" font-size="9" fill="#6b7280" font-style="italic">  → branches ②③ never run</text>
  <text x="64" y="388" font-size="9" fill="#6b7280" font-style="italic">  (first success stops fallback)</text>
  <text x="64" y="402" font-size="9" fill="#6b7280" font-style="italic">  cost: 2 LLM calls total</text>

  <!-- Branch 2: question path -->
  <rect x="352" y="132" width="276" height="290" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="352" y="132" width="100" height="20" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="362" y="146" font-size="10" fill="#5b21b6" font-weight="600">[:sequence]</text>
  <line x1="490" y1="152" x2="490" y2="166" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="368" y="166" width="244" height="76" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <rect x="368" y="166" width="244" height="22" rx="6" fill="#9333ea"/>
  <rect x="368" y="180" width="244" height="6" fill="#9333ea"/>
  <text x="384" y="180" font-size="11" font-weight="bold" fill="white">[:llm-condition] is-question?</text>
  <text x="384" y="204" font-size="10" fill="#581c87">:model  gemini-2.5-flash</text>
  <text x="384" y="218" font-size="10" fill="#581c87">:question "Is this a question?"</text>
  <text x="384" y="232" font-size="10" fill="#581c87">:reads  [:message]</text>
  <rect x="368" y="244" width="52" height="16" rx="3" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="380" y="256" font-size="9" fill="#166534">yes → next</text>
  <rect x="428" y="244" width="60" height="16" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="438" y="256" font-size="9" fill="#991b1b">no → branch ③</text>
  <line x1="490" y1="260" x2="490" y2="276" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="486,274 490,282 494,274" fill="#7c3aed"/>
  <rect x="368" y="284" width="244" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="368" y="284" width="244" height="22" rx="6" fill="#4a7fe5"/>
  <rect x="368" y="298" width="244" height="6" fill="#4a7fe5"/>
  <text x="384" y="298" font-size="11" font-weight="bold" fill="white">[:llm] answer-question</text>
  <text x="384" y="322" font-size="10" fill="#1e3a5f">reads:  <tspan fill="#1d4ed8">message</tspan></text>
  <text x="384" y="336" font-size="10" fill="#1e3a5f">writes: <tspan fill="#7c3aed">★ reasoning</tspan><tspan fill="#1d4ed8">, reply</tspan></text>
  <text x="368" y="360" font-size="9" fill="#6b7280" font-style="italic">  Runs only if branch ① condition</text>
  <text x="368" y="374" font-size="9" fill="#6b7280" font-style="italic">  failed (message ≠ complaint).</text>

  <!-- Branch 3: general default -->
  <rect x="656" y="132" width="220" height="290" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="656" y="132" width="160" height="20" rx="4" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="666" y="146" font-size="10" fill="#1e40af" font-weight="600">[:llm] general-response</text>
  <text x="666" y="176" font-size="10" fill="#374151">reads:  <tspan fill="#1d4ed8">message</tspan></text>
  <text x="666" y="194" font-size="10" fill="#374151">writes: <tspan fill="#7c3aed">★ reasoning</tspan><tspan fill="#1d4ed8">, reply</tspan></text>
  <rect x="666" y="210" width="194" height="196" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="676" y="228" font-size="10" fill="#1d4ed8" font-weight="600">Default path.</text>
  <text x="676" y="244" font-size="10" fill="#1d4ed8">No condition gate.</text>
  <text x="676" y="260" font-size="10" fill="#1d4ed8">Always runs from</text>
  <text x="676" y="274" font-size="10" fill="#1d4ed8">here if both LLM-</text>
  <text x="676" y="288" font-size="10" fill="#1d4ed8">conditions above</text>
  <text x="676" y="302" font-size="10" fill="#1d4ed8">answered "no".</text>
  <text x="676" y="322" font-size="10" fill="#6b7280">:fallback guarantees</text>
  <text x="676" y="336" font-size="10" fill="#6b7280">a :reply is written.</text>

  <text x="444" y="468" font-size="11" fill="#64748b" text-anchor="middle">Each :llm-condition costs one LLM call. The :llm response adds another. Total: 2 LLM calls for the winning branch, 0 for losing branches.</text>
</svg>
